<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero — Paper</title>
    <style>
        @font-face {
            font-family: '188 Sans';
            src: url('fonts/188-Sans-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: '188 Sans';
            src: url('fonts/188-Sans-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: '188 Sans', Arial, Helvetica, sans-serif;
            background: #fff;
            color: #000;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 3vw;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            z-index: 10;
        }
        .nav-name {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.04em;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            font-size: 13px;
        }
        .nav-status {
            font-size: 11px;
            letter-spacing: 0.04em;
            color: #666;
        }

        .hero {
            width: 100%;
            height: 100vh;
            padding: 0 3vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-bottom: 12vh;
        }
        .hero h1 {
            font-weight: normal;
            line-height: var(--lh, 0.88);
            letter-spacing: var(--ls, -0.03em);
            font-size: var(--fs, 14vw);
        }
        .hero h1 span {
            display: block;
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 20px;
            left: 3vw;
            right: 3vw;
            display: flex;
            gap: 32px;
            align-items: center;
            font-family: monospace;
            font-size: 12px;
            background: rgba(255,255,255,0.9);
            padding: 12px 0;
            border-top: 1px solid #ccc;
            z-index: 10;
        }
        .control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .controls input[type="range"] {
            width: 160px;
            cursor: pointer;
        }
        .controls .val {
            min-width: 64px;
            text-align: right;
        }
    </style>
</head>
<body>

<nav>
    <span class="nav-name">Capital Structures, Inc.</span>
    <div class="nav-links">
        <span>Structures</span>
        <span>Participate</span>
        <span>Status</span>
        <span>Operations</span>
    </div>
    <span class="nav-status">Delaware C-Corp · Est. 2025</span>
</nav>

<div class="hero">
    <h1><span>The world's</span><span>leading</span><span>company.</span></h1>
</div>

<div class="controls">
    <div class="control">
        <label>size</label>
        <input type="range" id="fs" min="6" max="24" step="0.25" value="14">
        <span class="val" id="fs-val">14vw</span>
    </div>
    <div class="control">
        <label>leading</label>
        <input type="range" id="lh" min="0.7" max="1.1" step="0.01" value="0.88">
        <span class="val" id="lh-val">0.88</span>
    </div>
    <div class="control">
        <label>tracking</label>
        <input type="range" id="ls" min="-0.06" max="0.02" step="0.005" value="-0.03">
        <span class="val" id="ls-val">-0.03em</span>
    </div>
</div>

<script>
    const hero = document.querySelector('.hero');
    const update = () => {
        const fs = document.getElementById('fs').value;
        const lh = document.getElementById('lh').value;
        const ls = document.getElementById('ls').value;
        hero.style.setProperty('--fs', fs + 'vw');
        hero.style.setProperty('--lh', lh);
        hero.style.setProperty('--ls', ls + 'em');
        document.getElementById('fs-val').textContent = fs + 'vw';
        document.getElementById('lh-val').textContent = lh;
        document.getElementById('ls-val').textContent = ls + 'em';
    };
    document.getElementById('fs').addEventListener('input', update);
    document.getElementById('lh').addEventListener('input', update);
    document.getElementById('ls').addEventListener('input', update);
</script>

</body>
</html>
